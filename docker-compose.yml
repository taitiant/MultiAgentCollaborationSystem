name: macs

x-build-args: &macs-build-args
  PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-docker.m.daocloud.io/library/python:3.11-slim}
  PIP_INDEX_URL: ${PIP_INDEX_URL:-}
  PIP_EXTRA_INDEX_URL: ${PIP_EXTRA_INDEX_URL:-}

services:
  macs:
    container_name: macs-macs
    build:
      context: .
      args: *macs-build-args
    ports:
      - "8000:8000"
    volumes:
      - ./workspace:/app/workspace
      - ./data:/app/data
      - ./config:/app/config
    environment:
      - PYTHONPATH=/app
      - DB_URL=postgresql+psycopg://${POSTGRES_USER:-macs}:${POSTGRES_PASSWORD:-macs}@pgsql:5432/${POSTGRES_DB:-macs}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - CODEX_API_KEY=${CODEX_API_KEY:-}
    depends_on:
      pgsql:
        condition: service_healthy
    restart: unless-stopped
  frontend:
    container_name: macs-frontend
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
  pgsql:
    container_name: macs-pgsql
    image: ${POSTGRES_IMAGE:-docker.m.daocloud.io/library/postgres:16-alpine}
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-macs}
      - POSTGRES_USER=${POSTGRES_USER:-macs}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-macs}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-macs} -d ${POSTGRES_DB:-macs}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
  nginx:
    container_name: macs-nginx
    image: ${NGINX_IMAGE:-docker.m.daocloud.io/library/nginx:1.25-alpine}
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - macs
      - frontend

volumes:
  pgdata:
