}

async function rerunSelectedStage() {
  if (!isStageEvent(selectedEventKey)) return;
  const ok = confirm(`确认重跑阶段 ${selectedEventKey} 吗？`);
  if (!ok) return;
  isExecuting = true;
  document.getElementById('runHint').textContent = `正在重跑阶段 ${selectedEventKey}...`;
  if (livePollTimer) clearInterval(livePollTimer);
  livePollTimer = setInterval(autoRefreshAll, 700);
  try {
    const resp = await fetch(`/tasks/${encodeURIComponent(taskId)}/stages/${encodeURIComponent(selectedEventKey)}/rerun`, { method: 'POST' });
    const data = await resp.json().catch(() => ({}));
    if (!resp.ok || data.status === 'failed') {
      const msg = data.detail || data.error || '阶段重跑失败';
      document.getElementById('runHint').textContent = msg;
      alert(msg);
    } else if (data.status === 'await_user') {
      document.getElementById('runHint').textContent = `阶段 ${selectedEventKey} 等待人工介入`;
    }
  } finally {
    isExecuting = false;
    if (livePollTimer) {
      clearInterval(livePollTimer);
      livePollTimer = null;
    }
    await refreshAll();
  }
}

async function deleteTask() {
  const ok = confirm(`确认删除任务 ${taskId} 吗？这会删除任务记录与事件。`);
  if (!ok) return;
  const resp = await fetch(`/tasks/${encodeURIComponent(taskId)}?purge_workspace=true`, { method: 'DELETE' });
  const data = await resp.json();
  if (!resp.ok) {
    alert(data.detail || '删除失败');
    return;
  }
  location.href = '/tasks.html';
}

  if (Date.now() < suppressNodeClickUntil) return;

  selectedTimelineEventId = [...taskEvents].reverse().find((event) => event.payload?.stage === eventKey)?.event_id || '';

}

function openConfigDrawer() {
  document.getElementById('configDrawer').classList.add('open');
  document.getElementById('drawerMask').classList.add('open');
}

function closeConfigDrawer() {
  document.getElementById('configDrawer').classList.remove('open');
  if (!document.getElementById('infoDrawer').classList.contains('open')) {
    document.getElementById('drawerMask').classList.remove('open');
  }
}

async function runStep() {
  if (!taskId) return;
  if (!hasAvailableProviders()) {
    alert('请先配置可用模型后再执行任务。');
    return;
  }
  isExecuting = true;
  document.getElementById('runBtn').disabled = true;
  renderGraph();
  if (livePollTimer) clearInterval(livePollTimer);
  livePollTimer = setInterval(autoRefreshAll, 700);
  try {
    const resp = await fetch(`/tasks/${encodeURIComponent(taskId)}/step`, { method: 'POST' });
    const data = await resp.json().catch(() => ({}));
    if (!resp.ok || data.status === 'failed') {
      const msg = data.detail || data.error || `执行失败（HTTP ${resp.status}）`;
      document.getElementById('runHint').textContent = msg;
      alert(msg);
    } else if (data.status === 'await_user') {
      document.getElementById('runHint').textContent = '任务等待人工介入';
    }
  } finally {
    isExecuting = false;
    document.getElementById('runBtn').disabled = false;
    if (livePollTimer) {
      clearInterval(livePollTimer);
      livePollTimer = null;
    }
    await refreshAll();
  }
}

async function abortTask() {
  const resp = await fetch(`/tasks/${encodeURIComponent(taskId)}/abort`, { method: 'POST' });
  const data = await resp.json();
  if (!resp.ok) {
    alert(data.detail || '中止失败');
    return;
  }
  isExecuting = false;
  document.getElementById('runBtn').disabled = false;
  if (livePollTimer) {
    clearInterval(livePollTimer);
    livePollTimer = null;
  }
  await refreshAll();
}

function commitViewUpdate() {
  const taskSig = buildTaskDataSignature(taskData, leaderPlan, stageDefinitions);
  const eventsSig = buildEventsDataSignature(taskEvents);
  const configSig = buildConfigDataSignature(effectiveEventConfigs, eventDetails, stageDefinitions, defaultModelProvider, conversationGroups, leaderPlan);
  const collaborationSig = buildCollaborationDataSignature(collaborationData);

  const taskChanged = taskSig !== lastTaskDataSignature;
  const eventsChanged = eventsSig !== lastFetchedEventsSignature;
  const configChanged = configSig !== lastFetchedConfigSignature;
  const collaborationChanged = collaborationSig !== lastFetchedCollaborationSignature;

  if (taskChanged || eventsChanged || configChanged) renderTaskInfo();
  if (taskChanged || eventsChanged || configChanged || collaborationChanged) renderGraph();
  if (eventsChanged) {
    renderTimeline();
    renderStageOutputs();
    renderArtifacts();
    renderLogsAndJson();
  }
  if (eventsChanged || collaborationChanged || configChanged) renderCollaborationStatus();
  if (eventsChanged || configChanged) renderConfigEditor(false);

  lastTaskDataSignature = taskSig;
  lastFetchedEventsSignature = eventsSig;
  lastFetchedConfigSignature = configSig;
  lastFetchedCollaborationSignature = collaborationSig;
}

async function refreshAll() {
  if (refreshAllInFlight) return;
  refreshAllInFlight = true;
  try {
    const nextTaskPromise = fetchTask();
    const nextEventsPromise = fetchEvents();
    const nextTask = await nextTaskPromise;
    const nextEvents = await nextEventsPromise;
    taskData = nextTask;
    taskEvents = nextEvents;
    await Promise.all([
      fetchEventConfigs(),
      fetchCollaboration(),
    ]);
    commitViewUpdate();
  } finally {
    refreshAllInFlight = false;
  }
}

async function refreshCollaborationPanel() {
  if (refreshCollaborationInFlight || !taskId) return;
  refreshCollaborationInFlight = true;
  try {
    [taskEvents] = await Promise.all([
      fetchEvents(),
      fetchCollaboration(),
    ]);
    commitViewUpdate();
  } finally {
    refreshCollaborationInFlight = false;
  }
}

(async () => {
  if (!taskId) {
    document.getElementById('taskInfo').textContent = '缺少 task_id 参数';
    document.getElementById('flowGraph').innerHTML = '<div class="hint">请从任务中心打开任务详情，或在 URL 中传入 task_id。</div>';
    return;
  }
  providers = await fetchProviders();
  renderSetupBanner();
  if (!hasAvailableProviders()) {
    renderGraph();
  }
  loadWorkflowPrefs();
  await refreshAll();
  window.addEventListener('resize', () => {
    if (!workflowUserAdjustedView) {
      workflowAutoFitPending = true;
      renderGraph();
      return;
    }
    updateWorkflowTransform();
  });
  window.addEventListener('beforeunload', () => {
    closeTaskStream();
    stopFallbackPolling();
    if (taskStreamReconnectTimer) {
      clearTimeout(taskStreamReconnectTimer);
      taskStreamReconnectTimer = null;
    }
  });
  setupRealtimeUpdates();
})();

  </script>
</body>
</html>
