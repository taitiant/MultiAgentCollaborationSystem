<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>任务详情 - MACS</title>
  <link rel="stylesheet" href="/app-shell.css?v=20260324b" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap');

    :root {
      --bg-a: #0f2237;
      --bg-b: #183f5f;
      --panel: rgba(255, 255, 255, 0.92);
      --panel-border: rgba(255, 255, 255, 0.34);
      --ink: #17212e;
      --muted: #5f6c7d;
      --done: #2f9e44;
      --error: #d9480f;
      --waiting: #7b61ff;
      --radius: 14px;
      --shadow: 0 20px 42px rgba(8, 20, 38, 0.28);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "IBM Plex Sans", "Noto Sans SC", sans-serif;
    }

    .shell {
      display: grid;
      gap: 18px;
      max-width: none;
      width: 100%;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
      backdrop-filter: blur(5px);
      min-width: 0;
    }

    h1, h2 { margin: 0; }
    h1 { font-size: clamp(22px, 3.2vw, 34px); }
    h2 { font-size: 18px; margin-bottom: 10px; }

    .hint { font-size: 12px; color: var(--muted); }

    .top {
      display: grid;
      grid-template-columns: minmax(320px, 1.08fr) minmax(300px, 0.92fr);
      gap: 12px;
      align-items: center;
    }

    .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }

    button {
      border: none;
      border-radius: 10px;
      color: #fff;
      background: linear-gradient(135deg, #1f6fe5, #0e8b74);
      padding: 8px 14px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }

    button.secondary { background: linear-gradient(135deg, #6c7a8d, #516273); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }

    .setup-banner {
      display:none;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      border:1px solid rgba(255, 184, 77, 0.4);
      background:linear-gradient(135deg, rgba(255,245,214,.96), rgba(255,238,204,.98));
      color:#7a4b00;
      border-radius:14px;
      padding:14px 16px;
      box-shadow:0 12px 24px rgba(122,75,0,.08);
      margin-bottom:12px;
    }
    .setup-banner.show { display:flex; }
    .setup-banner .title { font-weight:800; font-size:14px; margin-bottom:4px; }
    .setup-banner .desc { font-size:12px; line-height:1.5; }

    .progress-shell {
      position: relative;
      height: 12px;
      border-radius: 999px;
      background: #e8edf3;
      overflow: hidden;
      margin-top: 8px;
    }

    .progress {
      height: 100%;
      width: 0;
      border-radius: inherit;
      background: linear-gradient(90deg, #1f6fe5, #0e8b74);
      transition: width 0.45s ease;
    }

    .progress.executing {
      background: linear-gradient(90deg, #f59f00, #fab005, #f08c00);
      background-size: 220% 100%;
      animation: stream 1.2s linear infinite;
    }

    @keyframes stream {
      from { background-position: 0% 0; }
      to { background-position: 220% 0; }
    }

    .workspace {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      min-width: 0;
    }

    .workflow-head {
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:14px;
      margin-bottom:10px;
      flex-wrap:wrap;
    }
    .workflow-head > div:first-child,
    .workflow-caption > div,
    .chat-stage-head > div:first-child {
      min-width: 0;
    }
    .flow-wrap { overflow-x: auto; padding: 8px 0 4px; width:100%; max-width:100%; min-width:0; }
    .workflow-canvas {
      position: relative;
      width: 100%;
      min-width: 0;
      height: clamp(300px, 34vw, 360px);
      border-radius: 22px;
      background:
        radial-gradient(circle at top left, rgba(31, 111, 229, 0.08), transparent 30%),
        radial-gradient(circle at bottom right, rgba(14, 139, 116, 0.1), transparent 28%),
        linear-gradient(180deg, rgba(251, 253, 255, 0.98), rgba(241, 247, 252, 0.96));
      border: 1px solid #d8e5f1;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.7);
      overflow: hidden;
    }
    .workflow-grid { position:absolute; inset:0; background-image: linear-gradient(rgba(125, 147, 170, 0.08) 1px, transparent 1px), linear-gradient(90deg, rgba(125, 147, 170, 0.08) 1px, transparent 1px); background-size:28px 28px; pointer-events:none; }
    .workflow-svg { position:absolute; inset:0; width:100%; height:100%; overflow:visible; pointer-events:none; }
    .workflow-edge { fill:none; stroke:#c7d6e6; stroke-width:3; stroke-linecap:round; stroke-linejoin:round; opacity:.95; }
    .workflow-edge.running { stroke:#f59f00; stroke-width:4; stroke-dasharray:10 10; animation: edgeFlow .9s linear infinite; filter: drop-shadow(0 0 6px rgba(245,159,0,.3)); }
    .workflow-edge.done { stroke:#37b24d; }
    .workflow-edge.rework { stroke:#fa5252; stroke-width:4; stroke-dasharray:12 8; animation: edgeFlow 1.1s linear infinite; }
    .workflow-edge.error { stroke:#e8590c; stroke-width:4; stroke-dasharray:6 8; animation: edgePulse .9s ease-in-out infinite; }
    .workflow-edge.waiting { stroke:#7b61ff; stroke-width:4; stroke-dasharray:7 8; }
    .workflow-edge-label { font-size:11px; fill:#62778d; font-weight:600; }
    .workflow-edge-label.running { fill:#9a6700; }
    .workflow-edge-label.done { fill:#2b8a3e; }
    .workflow-edge-label.rework, .workflow-edge-label.error { fill:#c92a2a; }
    .workflow-edge-label.waiting { fill:#6741d9; }
    @keyframes edgeFlow { from { stroke-dashoffset: 20; } to { stroke-dashoffset: 0; } }
    @keyframes edgePulse { 0%,100% { opacity: .55; } 50% { opacity: 1; } }
    .workflow-node { position:absolute; border-radius:18px; padding:12px 12px 11px; border:1px solid #d6e0ea; background:rgba(255,255,255,.97); text-align:left; font:inherit; color:#1f2f3e; box-shadow:0 10px 24px rgba(32,52,75,.08); backdrop-filter:blur(4px); overflow:hidden; display:grid; align-content:start; gap:6px; }
    .workflow-node:hover { transform:none; filter:none; }
    .workflow-node .name { font-weight:700; font-size:13px; color:#1b2f45; display:grid; grid-template-columns:26px minmax(0,1fr); align-items:start; gap:8px; overflow:hidden; }
    .workflow-node .name-text { line-height:1.4; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; word-break:break-word; }
    .workflow-node .role { font-size:11px; color:#6b7d91; line-height:1.45; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; word-break:break-word; }
    .workflow-node .meta { font-size:12px; color:#486178; line-height:1.4; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; word-break:break-word; }
    .workflow-node .phase {
      display:inline-flex;
      align-items:center;
      width:max-content;
      max-width:100%;
      padding:4px 8px;
      border-radius:999px;
      font-size:11px;
      font-weight:700;
      line-height:1.4;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      background:#edf4fb;
      color:#4f647c;
    }
    .workflow-node .phase.active {
      background:#eef5ff;
      color:#315f98;
    }
    .workflow-node .phase.waiting,
    .workflow-node .phase.warning {
      background:#fff2d8;
      color:#9a6700;
    }
    .workflow-node .phase.done {
      background:#e8f7ee;
      color:#2b8a3e;
    }
    .workflow-node .phase.error {
      background:#ffe7e5;
      color:#c03426;
    }
    .workflow-node .submeta { display:flex; gap:8px; flex-wrap:wrap; align-items:center; overflow:hidden; }
    .workflow-group {
      position: absolute;
      border-radius: 20px;
      pointer-events: none;
    }
    .workflow-group.loop {
      border: 1px dashed rgba(80, 120, 166, 0.45);
      background: rgba(108, 169, 255, 0.05);
    }
    .workflow-group.conversation {
      border: 1px solid rgba(60, 117, 206, 0.28);
      background: linear-gradient(180deg, rgba(234, 242, 255, 0.68), rgba(245, 249, 255, 0.3));
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.45);
    }
    .workflow-group-title {
      position: absolute;
      top: -12px;
      left: 16px;
      padding: 2px 10px;
      border-radius: 999px;
      background: #edf4ff;
      color: #4b6580;
      font-size: 11px;
      font-weight: 700;
    }
    .workflow-group.conversation .workflow-group-title {
      background: #eaf2ff;
      color: #315c97;
    }
    .workflow-group-meta {
      margin-left: 6px;
      padding: 1px 7px;
      border-radius: 999px;
      background: rgba(255,255,255,.72);
      color: inherit;
      font-size: 10px;
      font-weight: 700;
    }
    .event-item.active { border-color:#1f6fe5; box-shadow:0 0 0 3px rgba(31,111,229,.12); }
    .workflow-node.clickable { cursor:pointer; }
    .workflow-node.selected { border-color:#1f6fe5; box-shadow:0 0 0 3px rgba(31,111,229,.14), 0 12px 28px rgba(32,52,75,.16); }
    .workflow-node.hot { box-shadow:0 0 0 3px rgba(31,111,229,.10), 0 12px 28px rgba(32,52,75,.16); }
    .workflow-node.pending { border-color:#d6e0ea; }
    .workflow-node.running { border-color:#ffd082; box-shadow:0 0 0 3px rgba(245,159,0,.18), 0 12px 28px rgba(32,52,75,.14); background:linear-gradient(180deg,#fff9ec,#fffdf7); animation: nodePulse 1.15s ease-in-out infinite; }
    .workflow-node.done { border-color:#93d6a1; background:linear-gradient(180deg,#eefaf1,#f9fffb); }
    .workflow-node.rework { border-color:#ff8787; background:linear-gradient(180deg,#fff1f1,#fff8f8); animation: nodePulseRed 1.1s ease-in-out infinite; }
    .workflow-node.error { border-color:#ffc3a6; background:linear-gradient(180deg,#fff1ea,#fff8f5); animation: nodePulseRed .85s ease-in-out infinite; }
    .workflow-node.waiting { border-color:#c6b8ff; background:linear-gradient(180deg,#f4f0ff,#faf8ff); }
    .workflow-node.pending .workflow-icon { background:#edf3f9; color:#51677f; }
    .workflow-node.running .workflow-icon { background:#fff0cc; color:#9a6700; }
    .workflow-node.done .workflow-icon { background:#e5f6e8; color:#2b8a3e; }
    .workflow-node.rework .workflow-icon,
    .workflow-node.error .workflow-icon { background:#ffe5e5; color:#c92a2a; }
    .workflow-node.waiting .workflow-icon { background:#efe8ff; color:#6741d9; }
    .workflow-chip { display:inline-flex; align-items:center; border-radius:999px; padding:2px 0; font-size:11px; font-weight:700; background:transparent; color:#3e556d; max-width:100%; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .workflow-chip.count { color:#53697f; flex:0 0 auto; }
    .workflow-chip.status { position:relative; padding-left:12px; min-width:0; }
    .workflow-chip.status::before {
      content:"";
      position:absolute;
      left:0;
      top:50%;
      width:6px;
      height:6px;
      border-radius:999px;
      transform:translateY(-50%);
      background:currentColor;
    }
    .workflow-chip.pending { color:#5c7187; }
    .workflow-chip.running { color:#9a6700; }
    .workflow-chip.done { color:#2b8a3e; }
    .workflow-chip.rework, .workflow-chip.error { color:#c92a2a; }
    .workflow-chip.waiting { color:#6741d9; }
    .workflow-chip.warning { color:#9a6700; }
    .workflow-chip.critical { color:#c92a2a; }
    .workflow-icon { width:26px; height:26px; border-radius:9px; display:inline-flex; align-items:center; justify-content:center; font-size:14px; background:#edf3f9; margin-top:1px; }
    @keyframes nodePulse { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
    @keyframes nodePulseRed { 0%,100% { transform: translateY(0); box-shadow: 0 0 0 2px rgba(250,82,82,.12), 0 10px 24px rgba(32,52,75,.12); } 50% { transform: translateY(-3px); box-shadow: 0 0 0 4px rgba(250,82,82,.18), 0 14px 28px rgba(32,52,75,.16); } }
    .workflow-legend { display:flex; gap:10px; flex-wrap:wrap; margin-top:12px; color:#5c7088; font-size:11px; }
    .workflow-legend span { display:inline-flex; align-items:center; gap:6px; }
    .workflow-legend i { display:inline-block; width:18px; height:8px; border-radius:999px; background:#c7d6e6; }
    .workflow-legend i.running { background:#f59f00; }
    .workflow-legend i.rework { background:#fa5252; }
    .workflow-legend i.done { background:#37b24d; }
    .workflow-toolbar {
      display:flex; gap:8px; align-items:center; justify-content:flex-end; max-width:100%; padding:8px 10px; border-radius:14px; background:rgba(255,255,255,.92); border:1px solid rgba(210,225,240,.9); box-shadow:0 8px 18px rgba(25,48,76,.12); flex-wrap:wrap;
    }
    .workflow-toolbar button { min-width:40px; padding:6px 10px; border-radius:10px; font-size:12px; }
    .workflow-scale { min-width:44px; flex:0 0 auto; text-align:center; color:#51677f; font-size:12px; font-weight:700; }
    .workflow-caption {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-top:12px;
      flex-wrap:wrap;
    }
    .workflow-tip {
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:7px 10px;
      border-radius:999px;
      background:#eef5fc;
      color:#47627e;
      font-size:12px;
    }
    .workflow-tip strong { color:#204264; }
    .workflow-empty {
      position:relative;
      display:grid;
      align-content:center;
      gap:14px;
      height:100%;
      min-height:0;
      padding:28px 30px;
      border-radius:inherit;
      background:
        radial-gradient(circle at 18% 22%, rgba(47,125,246,.10), transparent 28%),
        radial-gradient(circle at 82% 18%, rgba(15,157,116,.10), transparent 24%),
        linear-gradient(180deg, rgba(250,252,255,.98), rgba(243,248,253,.96));
    }
    .workflow-empty::before {
      content:"";
      position:absolute;
      inset:22px;
      border-radius:20px;
      border:1px dashed rgba(167, 187, 209, .72);
      pointer-events:none;
    }
    .workflow-empty > * {
      position:relative;
      z-index:1;
    }
    .workflow-empty-title {
      display:grid;
      gap:6px;
      max-width:560px;
    }
    .workflow-empty-title strong {
      color:#193450;
      font-size:18px;
      letter-spacing:.01em;
    }
    .workflow-empty-title span {
      color:#5d7187;
      font-size:13px;
      line-height:1.7;
    }
    .workflow-empty-pills {
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }
    .workflow-empty-pill {
      display:inline-flex;
      align-items:center;
      padding:6px 10px;
      border-radius:999px;
      background:#edf4fb;
      color:#49637d;
      font-size:12px;
      font-weight:700;
    }
    .workflow-empty-pill.running {
      background:#fff4d8;
      color:#9a6700;
    }
    .workflow-empty-pill.done {
      background:#e9f8ef;
      color:#2b8a3e;
    }
    .workflow-empty-pill.error {
      background:#ffe8e5;
      color:#c03426;
    }
    .workflow-empty-actions {
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .workflow-scene { position:absolute; left:0; top:0; width:1040px; height:340px; transform-origin:0 0; }
    .workflow-minimap { position:absolute; right:14px; bottom:14px; z-index:4; width:170px; height:96px; border-radius:14px; background:rgba(255,255,255,.92); border:1px solid rgba(210,225,240,.92); box-shadow:0 8px 18px rgba(25,48,76,.12); overflow:hidden; pointer-events:none; }
    .workflow-minimap-grid { position:absolute; inset:0; background-image: linear-gradient(rgba(125,147,170,.08) 1px, transparent 1px), linear-gradient(90deg, rgba(125,147,170,.08) 1px, transparent 1px); background-size:12px 12px; }
    .workflow-minimap-node { position:absolute; border-radius:4px; background:rgba(120,141,164,.75); }
    .workflow-minimap-node.running { background:rgba(245,159,0,.9); }
    .workflow-minimap-node.done { background:rgba(47,158,68,.85); }
    .workflow-minimap-node.rework, .workflow-minimap-node.error { background:rgba(250,82,82,.9); }
    .workflow-minimap-node.waiting { background:rgba(123,97,255,.85); }
    .workflow-minimap-viewport { position:absolute; border:2px solid rgba(31,111,229,.78); background:rgba(31,111,229,.08); border-radius:6px; }

    .cfg-box {
      border: 1px solid #e4ebf3;
      border-radius: 12px;
      background: #f9fbfe;
      padding: 12px;
      max-height: 70vh;
      overflow: auto;
      min-width: 0;
    }

    .drawer {
      position: fixed;
      top: 0;
      right: 0;
      width: min(520px, 94vw);
      height: 100vh;
      background: rgba(246, 250, 255, 0.98);
      border-left: 1px solid #d7e3f1;
      box-shadow: -12px 0 30px rgba(14, 34, 60, 0.18);
      z-index: 30;
      padding: 14px;
      transform: translateX(100%);
      transition: transform 0.2s ease;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .drawer.open { transform: translateX(0); }
    .drawer-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0; flex: 0 0 auto; }
    .drawer .cfg-box {
      flex: 1 1 auto;
      min-height: 0;
      max-height: none;
    }
    #infoDrawer pre,
    #infoDrawer .timeline {
      max-height: none;
      min-height: 100%;
    }
    #infoDrawerBody {
      min-height: calc(100vh - 120px);
    }
    .drawer-mask {
      position: fixed;
      inset: 0;
      background: rgba(8, 20, 38, 0.26);
      z-index: 20;
      display: none;
    }
    .drawer-mask.open { display: block; }

    .cfg-title { font-size: 13px; font-weight: 700; color: #364e68; margin-bottom: 8px; }
    .detail-stack { display:grid; gap:10px; margin-top:12px; }
    .detail-card {
      border:1px solid #e2ebf4;
      border-radius:14px;
      background:linear-gradient(180deg, #ffffff, #f7fbff);
      padding:12px;
    }
    .detail-card strong {
      display:block;
      font-size:13px;
      color:#1e3854;
      margin-bottom:6px;
    }
    .detail-card .detail-meta {
      color:#5d7187;
      font-size:12px;
      line-height:1.6;
      white-space:pre-wrap;
      word-break:break-word;
    }
    .detail-card.error {
      border-color:#ffd8c2;
      background:linear-gradient(180deg, #fff8f3, #fffdfb);
    }
    .detail-card.output {
      border-color:#d6ebdb;
      background:linear-gradient(180deg, #f4fcf6, #fbfffc);
    }
    .detail-card.prompt {
      border-color:#dbe7f7;
    }

    label { display: block; font-weight: 600; font-size: 12px; margin: 8px 0 4px; }

    input, select, textarea {
      width: 100%;
      border: 1px solid #d0dae5;
      border-radius: 10px;
      padding: 8px 9px;
      font: inherit;
      color: #1f2f3e;
      background: #fff;
    }

    textarea { resize: vertical; }

    .inline-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .timeline {
      max-height: 240px;
      overflow: auto;
      border: 1px solid #e7edf5;
      border-radius: 12px;
      background: #fcfdff;
      padding: 10px;
      margin-top: 10px;
    }

    .event-item {
      display: block;
      width: 100%;
      min-height: 0;
      padding: 8px 10px;
      border-radius: 10px;
      margin-bottom: 6px;
      border: 1px solid #edf1f5;
      background: #fff;
      color: inherit;
      text-align: left;
      box-shadow: none;
    }
    .event-item:hover { transform:none; filter:none; box-shadow:none; }

    .event-meta { font-size: 11px; color: #5f6c7d; margin-top: 4px; }
    .insight-grid { display:grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap:10px; margin-top:12px; }
    .insight-card { border:1px solid #e4ebf3; border-radius:14px; background:linear-gradient(180deg,#ffffff,#f7fbff); padding:12px; min-height:82px; }
    .insight-card .label { color:#667b90; font-size:11px; margin-bottom:6px; }
    .insight-card .value { color:#1d3550; font-size:20px; font-weight:700; }
    .insight-card .desc { color:#4d657d; font-size:12px; line-height:1.45; margin-top:8px; white-space:pre-wrap; }

    .pills { display: flex; flex-wrap: wrap; gap: 6px; }

    .pill {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 999px;
      background: #eef2f7;
      font-size: 11px;
      color: #31465f;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    pre {
      background: #0f1628;
      color: #d4ddff;
      border-radius: 12px;
      padding: 10px;
      max-height: 260px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      margin: 0;
    }

    .split {
      display: grid;
      grid-template-columns: 1fr 1fr;

const DEFAULT_STAGES = window.MacsWorkflow.DEFAULT_STAGES;

};

let taskData = null;
let taskEvents = [];
let selectedEventKey = '';
let rawEventConfigs = {};

let eventDetails = {};

let workflowView = { scale: 1, offsetX: 0, offsetY: 0 };
let customNodePositions = {};
let dragState = null;
let panState = null;
let suppressNodeClickUntil = 0;
let collapseDevLoop = false;
let selectedTimelineEventId = '';
let currentWorkflowMetrics = { width: 1220, height: 360 };
let collaborationData = { messages: [], blackboard: [], group_blackboards: [] };
let currentInfoDrawer = '';
let lastConversationRenderKey = '';
let workflowAutoFitPending = true;
let workflowUserAdjustedView = false;
let activeConversationGroupKey = '';
let activeConversationGroupState = null;

let refreshCollaborationInFlight = false;

let autoRefreshPausedUntil = 0;

let lastFetchedConfigSignature = '';
let lastFetchedCollaborationSignature = '';
let taskStream = null;

let taskStreamConnected = false;

let fallbackRefreshTimer = null;
let streamRefreshInFlight = false;

let streamVersions = { version: 0, task_version: 0, events_version: 0, collaboration_version: 0 };
const EVENT_FETCH_STEP = 300;
let eventFetchLimit = EVENT_FETCH_STEP;

function hasAvailableProviders() {
  return Array.isArray(providers) && providers.length > 0;
}

function renderSetupBanner() {
  const el = document.getElementById('setupBanner');
  if (!el) return;
  el.classList.toggle('show', !hasAvailableProviders());
}

function providerLabel(providerId) {
  if (!providerId) return '未配模型';
  const item = (providers || []).find((provider) => provider.id === providerId);
  if (!item) return providerId;
  return item.label || [item.credential_name, item.model].filter(Boolean).join(' / ') || item.model || item.id;
}

function providerModelLabel(providerId) {
  if (!providerId) return '未配置';
  const item = (providers || []).find((provider) => provider.id === providerId);
  if (!item) return providerId;
  return item.model || item.label || item.id;
}

function conversationStatusLabel(status) {
  const map = {
    pending: '未开始',
    running: '进行中',
    done: '已完成',
    rework: '待返工',
    error: '异常',
    waiting: '待处理',
  };
  return map[String(status || 'pending')] || String(status || 'pending');
}

function blackboardStatusLabel(status) {
  const map = {
    open: '待处理',
    settled: '已收敛',
    active: '同步中',
    empty: '暂无结论',
  };
  return map[String(status || 'active')] || String(status || 'active');
}

function rerunStatusLabel(status) {
  const map = {
    requested: '人工重跑中',
    done: '人工重跑完成',
    failed: '人工重跑未通过',
    error: '人工重跑失败',
    aborted: '人工重跑已中止',
  };
  return map[String(status || '')] || '人工重跑';
}

function getPendingHumanDecision() {
  return collaborationData?.pending_human_decision || taskData?.context?.pending_human_decision || null;
}

function canSubmitHumanDecision() {
  const pending = getPendingHumanDecision();
  return Boolean(pending && pending.kind === 'human_decision' && String(taskData?.status || '') === 'waiting_user');
}

function findLatestStageRerun(stageNames) {
  const history = findStageReruns(stageNames, 1);
  return history[history.length - 1] || null;
}

function findStageReruns(stageNames, limit = 12) {
  const target = new Set((stageNames || []).map((name) => String(name)));
  if (!target.size) return [];
  const rerunEvents = ['StageRerunRequested', 'StageRerunDone', 'StageRerunFailed', 'StageRerunError', 'StageRerunAborted'];
  const rows = [];
  for (let i = 0; i < taskEvents.length; i += 1) {
    const event = taskEvents[i];
    if (!rerunEvents.includes(event?.event_type)) continue;
    const stage = String(event?.payload?.stage || '');
    if (!target.has(stage)) continue;
    rows.push({
      eventId: String(event?.event_id || ''),
      eventType: event.event_type,
      stage,
      stageLabel: String(event?.payload?.label || currentStageMap()[stage]?.label || stage || ''),
      timestamp: Number(event.timestamp || 0),
      cleanedArtifacts: Number(event?.payload?.cleaned_artifacts || 0),
      cleanedOrphans: Number(event?.payload?.cleaned_orphans || 0),
      cleanupEnabled: Boolean(event?.payload?.cleanup_enabled),
      artifactCount: Number(event?.payload?.artifact_count || 0),
      error: String(event?.payload?.error || event?.payload?.feedback || ''),
      status: ({
        StageRerunRequested: 'requested',
        StageRerunDone: 'done',
        StageRerunFailed: 'failed',
        StageRerunError: 'error',
        StageRerunAborted: 'aborted',
      })[event.event_type] || '',
    });
  }
  return rows.slice(-Math.max(1, Number(limit || 1)));
}

function rerunNoticeText(rerunInfo) {
  if (!rerunInfo) return '';
  const status = String(rerunInfo.status || '');
  const stageText = rerunInfo.stageLabel || '当前阶段';
  if (status === 'requested') {
    return [
      `${stageText} 已进入人工重跑`,
      rerunInfo.cleanupEnabled && rerunInfo.cleanedArtifacts ? `已整理上一轮产物 ${rerunInfo.cleanedArtifacts} 项` : '',
      rerunInfo.cleanedOrphans ? `已整理旧文件 ${rerunInfo.cleanedOrphans} 项` : '',
    ].filter(Boolean).join('，');
  }
  if (status === 'done') {
    return [
      `${stageText} 人工重跑完成`,
      rerunInfo.artifactCount ? `本轮产出 ${rerunInfo.artifactCount} 个制品` : '',
    ].filter(Boolean).join('，');
  }
  if (status === 'failed') {
    return `${stageText} 人工重跑未通过${rerunInfo.error ? `，${rerunInfo.error}` : ''}`;
  }
  if (status === 'error') {
    return `${stageText} 人工重跑失败${rerunInfo.error ? `，${rerunInfo.error}` : ''}`;
  }
  if (status === 'aborted') {
    return `${stageText} 人工重跑已中止${rerunInfo.error ? `，${rerunInfo.error}` : ''}`;
  }
  return `${stageText} 已触发人工重跑`;
}

function getStatusClass(status) {
  if (!status) return 'status-created';
  return `status-${String(status).replace(/[^a-zA-Z0-9_]/g, '_')}`;
}

function safeToken(value, fallback = 'pending') {
  const token = String(value || fallback).replace(/[^a-zA-Z0-9_-]/g, '');
  return token || fallback;
}

const DISPLAY_TIME_ZONE = 'Asia/Shanghai';

function formatTimestamp(ts, withDate = true) {
  const value = Number(ts || 0);
  if (!value) return '—';
  const options = withDate
    ? { timeZone: DISPLAY_TIME_ZONE, hour12: false, year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit' }
    : { timeZone: DISPLAY_TIME_ZONE, hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' };
  return new Intl.DateTimeFormat('zh-CN', options).format(new Date(value * 1000));
}

function asISO(ts) {
  return `${formatTimestamp(ts, true)} (${DISPLAY_TIME_ZONE})`;
}

function escapeHtml(text) {
  return String(text || '').replace(/[&<>"']/g, (s) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[s]));
}

function noCacheUrl(path) {
  const separator = path.includes('?') ? '&' : '?';
  return `${path}${separator}_ts=${Date.now()}`;
}

function shortText(text, max = 160) {
  const raw = String(text || '').trim();
  if (!raw) return '';
  return raw.length > max ? `${raw.slice(0, max)}...` : raw;
}

function fallbackBlackboardSnapshot(entries, label = '共享黑板') {
  const sorted = [...(entries || [])].sort((a, b) => Number(b.updated_at || b.created_at || 0) - Number(a.updated_at || a.created_at || 0));
  const latest = sorted[0] || null;
  const openItems = sorted
    .filter((entry) => ['rework_request', 'smoke_feedback', 'test_feedback', 'prerequisite_gap'].includes(String(entry.entry_type || '')))
    .map((entry) => shortText(entry.content || entry.title || entry.entry_key || '', 120))
    .filter(Boolean)
    .slice(0, 3);
  return {

  return raw.split(/[\s_-]+/).filter(Boolean).map((part) => part[0]).join('').slice(0, 2).toUpperCase() || raw.slice(0, 2).toUpperCase();
}

function actorPalette(label) {
  const raw = String(label || 'assistant');
  let hash = 0;
  for (let i = 0; i < raw.length; i += 1) hash = ((hash << 5) - hash) + raw.charCodeAt(i);
  const hue = Math.abs(hash) % 360;
  return {
    bg: `hsla(${hue}, 72%, 92%, 1)`,
    border: `hsla(${hue}, 54%, 78%, 1)`,
    text: `hsla(${hue}, 52%, 30%, 1)`,
  };
}

  fallbackCollaborationTimer = setInterval(() => {

    taskStreamReconnectTimer = null;
    connectTaskStream();
  }, 2500);
}

async function flushTaskStreamUpdates() {
  if (streamRefreshInFlight) return;
  streamRefreshInFlight = true;
  try {
    while (pendingStreamUpdate.task || pendingStreamUpdate.events || pendingStreamUpdate.collaboration) {
      const requested = { ...pendingStreamUpdate };
      pendingStreamUpdate = { task: false, events: false, collaboration: false };
      const jobs = [];
      if (requested.task) {
        jobs.push(fetchTask().then((nextTask) => { taskData = nextTask; }));
        jobs.push(fetchEventConfigs());
      }
      if (requested.events) {
        jobs.push(fetchEvents().then((nextEvents) => { taskEvents = nextEvents; }));
      }
      if (requested.collaboration) {
        jobs.push(fetchCollaboration());
      }
      if (!jobs.length) break;
      await Promise.all(jobs);
      commitViewUpdate();
    }
  } finally {
    streamRefreshInFlight = false;
  }
}

function handleTaskStreamSnapshot(snapshot) {
  if (!snapshot || typeof snapshot !== 'object') return;
  const nextVersions = {
    version: Number(snapshot.version || 0),
    task_version: Number(snapshot.task_version || 0),
    events_version: Number(snapshot.events_version || 0),
    collaboration_version: Number(snapshot.collaboration_version || 0),
  };
  if (nextVersions.task_version > Number(streamVersions.task_version || 0)) pendingStreamUpdate.task = true;
  if (nextVersions.events_version > Number(streamVersions.events_version || 0)) pendingStreamUpdate.events = true;
  if (nextVersions.collaboration_version > Number(streamVersions.collaboration_version || 0)) pendingStreamUpdate.collaboration = true;
  streamVersions = {
    version: Math.max(Number(streamVersions.version || 0), nextVersions.version),
    task_version: Math.max(Number(streamVersions.task_version || 0), nextVersions.task_version),
    events_version: Math.max(Number(streamVersions.events_version || 0), nextVersions.events_version),
    collaboration_version: Math.max(Number(streamVersions.collaboration_version || 0), nextVersions.collaboration_version),
  };
  void flushTaskStreamUpdates();
}

function connectTaskStream() {
  if (!taskId) return;
  if (!window.EventSource) {
    startFallbackPolling();
    return;
  }
  closeTaskStream();
  const stream = new EventSource(`/tasks/${encodeURIComponent(taskId)}/stream`);
  taskStream = stream;
  stream.addEventListener('hello', (event) => {
    if (taskStream !== stream) return;
    try {
      handleTaskStreamSnapshot(JSON.parse(event.data || '{}'));
    } catch (_) {
      // noop
    }
  });
  stream.addEventListener('update', (event) => {
    if (taskStream !== stream) return;
    try {
      handleTaskStreamSnapshot(JSON.parse(event.data || '{}'));
    } catch (_) {
      // noop
    }
  });
  stream.onopen = () => {
    if (taskStream !== stream) return;
    taskStreamConnected = true;
    stopFallbackPolling();
  };
  stream.onerror = () => {
    if (taskStream !== stream) return;
    closeTaskStream();
    startFallbackPolling();
    scheduleTaskStreamReconnect();
  };
}

function setupRealtimeUpdates() {
  connectTaskStream();
  if (!taskStreamConnected) startFallbackPolling();
}

function eventTimestamp(event) {

}

function latestTaskEventByTypes(eventTypes) {
  const target = new Set(eventTypes || []);
  for (let i = taskEvents.length - 1; i >= 0; i -= 1) {
    const event = taskEvents[i];
    if (target.has(event?.event_type)) return event;
  }
  return null;
}

function extractStageSnapshot(stageKey) {
  const stageEvents = taskEvents.filter((event) => event?.payload?.stage === stageKey);
  const latestEvent = [...stageEvents].reverse().find((event) => [
    'StageDone',
    'StageRerunDone',
    'StageError',
    'StageRerunError',
    'StageRerunFailed',
    'StageRerunAborted',
    'StageAwait',
    'StageStart',
    'StageReview',
    'StageRework',
  ].includes(event.event_type)) || null;
  const latestResolved = [...stageEvents].reverse().find((event) => (
    event.event_type === 'StageRerunDone'
      || event.event_type === 'StageDone'
      || event.event_type === 'StageAwait'
      || (event.event_type === 'StageReview' && (event.payload?.pass === true || event.payload?.review_status === 'skipped'))
  )) || null;
  const latestIssue = [...stageEvents].reverse().find((event) => (
    (
      event.event_type === 'StageError'
      || event.event_type === 'StageRerunError'
      || event.event_type === 'StageRerunFailed'
      || event.event_type === 'StageRework'
      || (event.event_type === 'StageReview' && event.payload?.pass === false)
    )
    && (event.payload?.error || event.payload?.feedback || event.payload?.reason)
  )) || null;
  const latestError = latestIssue && (!latestResolved || eventTimestamp(latestIssue) > eventTimestamp(latestResolved))
    ? latestIssue
    : null;
  const latestOutput = [...stageEvents].reverse().find((event) => event.payload?.output_summary || event.payload?.output || event.payload?.result || event.payload?.artifacts?.length) || latestEvent || null;
  const latestReview = [...stageEvents].reverse().find((event) => event.event_type === 'StageReview') || null;
  return { stageEvents, latestEvent, latestError, latestOutput, latestReview, latestResolved };
}

function deriveDisplayTaskStatus(rawStatus, stageState, stages) {
  const persisted = String(rawStatus || 'unknown');
  const list = Array.isArray(stages) ? stages : [];
  if (!list.length) return persisted;
  const statuses = list.map((stage) => String(stageState?.[stage.name]?.status || 'pending'));
  if (statuses.length && statuses.every((status) => status === 'done')) return 'completed';
  if (persisted === 'completed') return 'completed';
  if (persisted === 'aborted') return 'aborted';
  if (persisted === 'waiting_user' || statuses.includes('waiting')) return 'waiting_user';
  if (isExecuting || persisted === 'running' || statuses.includes('running')) return 'running';
  if (statuses.includes('error')) return 'failed';
  if (statuses.includes('rework')) return persisted === 'failed' ? 'running' : persisted;
  return persisted;
}

function buildTaskTerminalNotice(activeGroup, stageState, stages) {
  const displayStatus = deriveDisplayTaskStatus(String(taskData?.status || ''), stageState, stages);
  if (!['completed', 'failed', 'aborted', 'waiting_user'].includes(displayStatus)) return null;
  const stageNames = new Set((activeGroup?.stages || []).map((stage) => String(stage?.name || '')).filter(Boolean));
  const allDone = (activeGroup?.stages || []).length > 0 && (activeGroup.stages || []).every((stage) => String(stageState?.[stage.name]?.status || 'pending') === 'done');
  const hasActiveBlocker = [...stageNames].some((stageName) => ['error', 'rework', 'waiting'].includes(String(stageState?.[stageName]?.status || '')));
  if (displayStatus === 'completed' && !allDone) return null;
  if (displayStatus !== 'completed' && !hasActiveBlocker) return null;
  const timestamp = latestTaskTimelineTimestamp() || Number(activeGroup?.latest?.created_at || 0) || Date.now() / 1000;
  const stageLabel = activeGroup?.label || '当前会话';
  const content = ({
    completed: `${stageLabel} 已完成，本次任务已收敛结束。`,
    failed: `${stageLabel} 仍存在阻塞，任务当前未完成，请优先处理剩余问题。`,
    aborted: `${stageLabel} 已停止推进，任务当前处于中止状态。`,
    waiting_user: `${stageLabel} 正等待人工决策或补充信息后继续。`,
  })[displayStatus] || '';
  const statusLevel = ({
    completed: 'done',
    failed: 'error',
    aborted: 'warning',
    waiting_user: 'waiting',
  })[displayStatus] || 'active';
  const statusText = ({
    completed: '任务完成',
    failed: '任务阻塞',
    aborted: '任务已中止',
    waiting_user: '等待人工处理',
  })[displayStatus] || '流程状态';
  return {
    kind: 'task_terminal',
    ts: timestamp + 0.0001,
    value: {
      stageLabel,
      statusLevel,
      statusText,
      content,
      timestamp,
      renderId: `${displayStatus}:${timestamp}:${activeGroup?.key || ''}`,
    },
  };
}

      desc: 'Leader 已产出流程定义，页面正在等待阶段定义与协作分组同步完成，稍后会自动切换到真实流程图。',
      tone: 'running',
      pills: ['已收到规划事件', asISO(planEvt.timestamp).replace(' (Asia/Shanghai)', '')],
    };
  }
  if (status === 'running' || isExecuting) {
    return {
      title: 'Leader 正在设计流程',
      desc: '当前还处于任务规划阶段。等待 Leader 智能体完成流程设计后，这里会直接展示真实流程，不再先显示模板链路。',
      tone: 'running',
      pills: ['流程规划中', '画布将自动刷新'],
    };
  }
  if (status === 'failed') {
    return {
      title: '流程设计未完成',
      desc: 'Leader 还没有给出可执行流程。可以查看右侧日志或再次执行 Step 继续推进规划。',
      tone: 'error',
      pills: ['尚无真实流程', '需要继续推进'],
    };
  }
  return {
    title: '等待开始流程设计',
    desc: '这是一个新任务。执行 Step 后，Leader 会先根据任务需求规划实际流程，随后这里再展示真实工作流。',
    tone: 'pending',
    pills: ['尚无真实流程', '不会再展示默认模板'],
  };
}

function setWorkflowToolbarEnabled(enabled) {
  ['workflowZoomOut', 'workflowZoomIn', 'workflowReset', 'workflowToggleGroup'].forEach((id) => {

  });
}

function getLatestStageEvent(stageName) {
  for (let i = taskEvents.length - 1; i >= 0; i -= 1) {
    const event = taskEvents[i];
    if (
      event.payload?.stage === stageName
      && ['StageDone', 'StageRerunDone', 'StageError', 'StageRerunError', 'StageRerunFailed', 'StageRerunAborted', 'StageAwait', 'StageStart'].includes(event.event_type)
    ) return event;
  }
  return null;
}

function getLatestStageReview(stageName) {
  for (let i = taskEvents.length - 1; i >= 0; i -= 1) {
    const event = taskEvents[i];
    if (event.payload?.stage === stageName && event.event_type === 'StageReview') return event;
  }
  return null;
}

function renderTaskInsights(events, stageState) {

    { label: '最新推进', value: info.lastProgress, desc: '这是最近一次真正推动流程前进的动作' },

function updateWorkflowTransform() {
  const scene = document.querySelector('#flowGraph .workflow-scene');
  const scaleLabel = document.getElementById('workflowScaleLabel');
  if (scene) {
    currentWorkflowMetrics = {
      width: Number(scene.dataset.width || 1220),
      height: Number(scene.dataset.height || 360),
    };
    scene.style.transform = `translate(${workflowView.offsetX}px, ${workflowView.offsetY}px) scale(${workflowView.scale})`;
  }
  if (scaleLabel) scaleLabel.textContent = `${Math.round(workflowView.scale * 100)}%`;
}

function clampWorkflowScale(scale) {
  return Math.max(0.36, Math.min(1.8, scale));
}

function autoFitWorkflowView(vm) {
  const canvas = document.getElementById('flowGraph');
  if (!canvas || !vm) return;
  const viewport = canvas.closest('.flow-wrap') || canvas;
  const bounds = vm.contentBounds || { minX: 0, minY: 0, maxX: vm.width, maxY: vm.height };
  const horizontalPadding = 54;
  const topPadding = 16;
  const bottomPadding = 26;
  const viewportWidth = viewport.clientWidth || canvas.clientWidth || vm.width;
  const viewportHeight = canvas.clientHeight || vm.height;
  const contentWidth = Math.max(1, Number(bounds.maxX || vm.width) - Number(bounds.minX || 0));
  const contentHeight = Math.max(1, Number(bounds.maxY || vm.height) - Number(bounds.minY || 0));
  const availableWidth = Math.max(320, viewportWidth - horizontalPadding * 2);
  const availableHeight = Math.max(180, viewportHeight - topPadding - bottomPadding);
  const targetScale = clampWorkflowScale(Math.min(availableWidth / contentWidth, availableHeight / contentHeight, 1));
  const horizontalSlack = Math.max(0, availableWidth - contentWidth * targetScale);
  workflowView.scale = targetScale;
  workflowView.offsetX = Math.round(horizontalPadding - Number(bounds.minX || 0) * targetScale + horizontalSlack / 2);
  workflowView.offsetY = Math.round(topPadding - Number(bounds.minY || 0) * targetScale);
  if (viewport && viewport !== canvas) viewport.scrollLeft = 0;
  workflowAutoFitPending = false;
}

function preferredWorkflowCanvasHeight() {
  const width = window.innerWidth || document.documentElement.clientWidth || 1280;
  if (width <= 640) return 300;
  if (width <= 820) return 320;
  if (width <= 1180) return 340;
  return 360;
}

function bindWorkflowInteractions(vm) {
  const canvas = document.getElementById('flowGraph');
  if (!canvas) return;
  canvas.onwheel = (event) => {
    event.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const mx = event.clientX - rect.left;
    const my = event.clientY - rect.top;
    const prev = workflowView.scale;
    const next = clampWorkflowScale(prev + (event.deltaY < 0 ? 0.08 : -0.08));
    if (next === prev) return;
    workflowView.offsetX = mx - ((mx - workflowView.offsetX) / prev) * next;
    workflowView.offsetY = my - ((my - workflowView.offsetY) / prev) * next;
    workflowView.scale = next;
    workflowAutoFitPending = false;
    workflowUserAdjustedView = true;
    updateWorkflowTransform();
    saveWorkflowPrefs();
    renderGraph();
  };
  canvas.onmousedown = (event) => {
    if (event.target.closest('.workflow-node')) return;
    panState = {
      startX: event.clientX,
      startY: event.clientY,
      offsetX: workflowView.offsetX,
      offsetY: workflowView.offsetY,
    };
  };
  document.onmousemove = (event) => {
    if (dragState) {
      const dx = (event.clientX - dragState.startX) / workflowView.scale;
      const dy = (event.clientY - dragState.startY) / workflowView.scale;
      customNodePositions[dragState.nodeId] = { x: dragState.originX + dx, y: dragState.originY + dy };
      suppressNodeClickUntil = Date.now() + 250;
      renderGraph();
      return;
    }
    if (!panState) return;
    workflowView.offsetX = panState.offsetX + (event.clientX - panState.startX);
    workflowView.offsetY = panState.offsetY + (event.clientY - panState.startY);
    workflowAutoFitPending = false;
    workflowUserAdjustedView = true;
    updateWorkflowTransform();
  };
  document.onmouseup = () => {
    if (dragState || panState) saveWorkflowPrefs();
    dragState = null;
    panState = null;
  };
  canvas.querySelectorAll('.workflow-node[data-node-id]').forEach((nodeEl) => {
    nodeEl.onmousedown = (event) => {
      const node = vm.nodes.find((item) => item.id === nodeEl.dataset.nodeId);
      if (!node) return;
      dragState = {
        nodeId: node.id,
        startX: event.clientX,
        startY: event.clientY,
        originX: node.x,
        originY: node.y,
      };
      event.stopPropagation();
    };
  });
  const zoomInBtn = document.getElementById('workflowZoomIn');
  if (zoomInBtn) zoomInBtn.onclick = () => {
    workflowView.scale = clampWorkflowScale(workflowView.scale + 0.1);
    workflowAutoFitPending = false;
    workflowUserAdjustedView = true;
    saveWorkflowPrefs();
    renderGraph();
  };
  const zoomOutBtn = document.getElementById('workflowZoomOut');
  if (zoomOutBtn) zoomOutBtn.onclick = () => {
    workflowView.scale = clampWorkflowScale(workflowView.scale - 0.1);
    workflowAutoFitPending = false;
    workflowUserAdjustedView = true;
    saveWorkflowPrefs();
    renderGraph();
  };
  const resetBtn = document.getElementById('workflowReset');
  if (resetBtn) resetBtn.onclick = () => {
    workflowView = { scale: 1, offsetX: 0, offsetY: 0 };
    workflowAutoFitPending = true;
    workflowUserAdjustedView = false;
    renderGraph();
  };
}

function renderGraph() {
  const flow = document.getElementById('flowGraph');
  const stages = currentStages();

    return;
  }
  if (!hasAvailableProviders()) {
    flow.innerHTML = '<div class="hint">尚未注册可用模型。请先前往 /models.html 配置凭据、模型，并至少为一个阶段绑定 LLM。</div>';
    document.getElementById('runHint').textContent = '未配置模型，无法执行';
    setWorkflowToolbarEnabled(false);
    return;
  }
  if (!stages.length) {
    const planning = planningStateMeta();
    flow.style.width = '100%';
    flow.style.minWidth = '0px';
    flow.style.height = `${preferredWorkflowCanvasHeight()}px`;
    flow.innerHTML = `
      <div class="workflow-empty">

          <strong>${escapeHtml(planning.title)}</strong>
          <span>${escapeHtml(planning.desc)}</span>
        </div>

          ${(planning.pills || []).map((pill) => `<span class="workflow-empty-pill ${escapeHtml(planning.tone || 'pending')}">${escapeHtml(pill)}</span>`).join('')}
        </div>
        <div class="workflow-empty-actions">
          <button type="button" ${isExecuting ? 'disabled' : ''} onclick="runStep()">执行 Step</button>
          <button type="button" class="secondary" onclick="refreshAll()">刷新状态</button>
        </div>
      </div>
    `;

      <div class="insight-card">
        <div class="label">当前阶段</div>
        <div class="value">${escapeHtml(isExecuting || String(taskData?.status || '') === 'running' ? '流程规划中' : '待规划')}</div>
        <div class="desc">${escapeHtml(leaderPlan?.summary || 'Leader 完成流程设计后，这里会切换为真实工作流。')}</div>
      </div>
      <div class="insight-card">
        <div class="label">阶段数量</div>
        <div class="value">-</div>
        <div class="desc">当前还没有可展示的真实阶段定义。</div>
      </div>
    `;
    const progressBar = document.getElementById('progressBar');
    progressBar.style.width = String(isExecuting || String(taskData?.status || '') === 'running' ? '18%' : '0%');
    progressBar.classList.toggle('executing', isExecuting || String(taskData?.status || '') === 'running');
    setWorkflowToolbarEnabled(false);
    const toggleBtn = document.getElementById('workflowToggleGroup');
    if (toggleBtn) toggleBtn.textContent = '折叠闭环';
    return;
  }
  setWorkflowToolbarEnabled(true);
  ensureSelectedStage();
  const stageState = summarizeStages(taskEvents);
  renderTaskInsights(taskEvents, stageState);
  const info = computeTaskInsights(taskEvents, stageState);
  const doneCount = stages.filter((stage) => stageState[stage.name]?.status === 'done').length;
  const progress = Math.min(100, Math.round((doneCount / Math.max(stages.length, 1)) * 100));
  const progressBar = document.getElementById('progressBar');
  progressBar.style.width = `${progress}%`;
  progressBar.classList.toggle('executing', isExecuting);

  const vm = buildWorkflowViewModel(taskEvents, stageState);
  currentWorkflowMetrics = { width: vm.width, height: vm.height };
  flow.style.width = '100%';
  flow.style.minWidth = '0px';
  flow.style.height = `${preferredWorkflowCanvasHeight()}px`;
  if (workflowAutoFitPending) autoFitWorkflowView(vm);
  const svg = [`<div class="workflow-scene" data-width="${vm.width}" data-height="${vm.height}" style="width:${vm.width}px;height:${vm.height}px;"><div class="workflow-grid"></div>`];
  svg.push(...(vm.groups || []).map((group) => `<div class="workflow-group ${escapeHtml(group.kind || 'loop')}" style="left:${group.x}px;top:${group.y}px;width:${group.width}px;height:${group.height}px;"><div class="workflow-group-title">${escapeHtml(group.title)}${group.meta ? `<span class="workflow-group-meta">${escapeHtml(group.meta)}</span>` : ''}</div></div>`));
  svg.push(`<svg class="workflow-svg" viewBox="0 0 ${vm.width} ${vm.height}" preserveAspectRatio="none"><defs>
    <marker id="arrowHeadTask-pending" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#a2b7cb"></path></marker>
    <marker id="arrowHeadTask-running" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#f59f00"></path></marker>
    <marker id="arrowHeadTask-done" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#37b24d"></path></marker>
    <marker id="arrowHeadTask-rework" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#fa5252"></path></marker>
    <marker id="arrowHeadTask-error" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#e8590c"></path></marker>
    <marker id="arrowHeadTask-waiting" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#7b61ff"></path></marker>
  </defs>`);
  vm.edges.forEach((edge) => {
    const klass = edge.status && edge.status !== 'pending' ? `workflow-edge ${edge.status}` : 'workflow-edge';
    const markerId = `arrowHeadTask-${edge.status || 'pending'}`;
    svg.push(`<path class="${klass}" d="${edge.path}" marker-end="url(#${markerId})"></path>`);
    if (edge.label) svg.push(`<text class="workflow-edge-label ${edge.status || 'pending'}" x="${edge.labelX ?? 24}" y="${edge.labelY ?? 24}">${escapeHtml(edge.label)}</text>`);
  });
  svg.push('</svg>');
  const nodesHtml = vm.nodes.map((node) => {
    const clickable = node.editable ? 'clickable' : '';
    const selected = selectedEventKey === node.id ? 'selected' : '';
    const hot = vm.hotNodeId === node.id ? 'hot' : '';
    const action = node.editable ? `onclick="setEventFocus('${node.id}')"` : '';
    const submeta = (node.submeta || []).map((chip) => {
      if (chip && typeof chip === 'object') {
        const tone = chip.tone ? ` ${chip.tone}` : '';
        const status = chip.status ? ` ${chip.status}` : '';
        return `<span class="workflow-chip${tone}${status}">${escapeHtml(chip.text || '')}</span>`;
      }
      return `<span class="workflow-chip ${node.status}">${escapeHtml(chip)}</span>`;
    }).join('');
    const metaText = node.metaLabel ? `${node.metaLabel} · ${node.meta}` : node.meta;
    return `<button data-node-id="${node.id}" type="button" class="workflow-node ${node.status} ${clickable} ${selected} ${hot}" style="left:${node.x}px;top:${node.y}px;width:${Math.round(node.width || 162)}px;height:${Math.round(node.height || 108)}px;" ${action}><div class="name"><span class="workflow-icon">${window.MacsWorkflow.stageIcon(node.stageType || node.id)}</span><span class="name-text">${escapeHtml(node.title)}</span></div>${node.role ? `<div class="role">角色 · ${escapeHtml(node.role)}</div>` : ''}<div class="meta">${escapeHtml(metaText)}</div>${node.phase ? `<div class="phase ${escapeHtml(node.phaseTone || 'active')}">${escapeHtml(node.phase)}</div>` : ''}${submeta ? `<div class="submeta">${submeta}</div>` : ''}</button>`;
  });
  flow.innerHTML = svg.join('') + nodesHtml.join('') + '</div>' + renderMiniMap(vm);
  updateWorkflowTransform();
  bindWorkflowInteractions(vm);
  const toggleBtn = document.getElementById('workflowToggleGroup');
  if (toggleBtn) toggleBtn.textContent = collapseDevLoop ? '展开闭环' : '折叠闭环';
  if (toggleBtn) toggleBtn.onclick = () => {
    collapseDevLoop = !collapseDevLoop;
    renderGraph();
  };

  const runHint = document.getElementById('runHint');
  const latestRerunEvent = latestTaskEventByTypes(['StageRerunRequested', 'StageRerunDone', 'StageRerunFailed', 'StageRerunError', 'StageRerunAborted']);
  const latestGraphEvent = latestTaskEventByTypes(['GraphAbort', 'GraphError', 'GraphRun']);
  const latestProcessEvent = [latestRerunEvent, latestGraphEvent]
    .filter(Boolean)
    .sort((a, b) => eventTimestamp(b) - eventTimestamp(a))[0] || null;
  if (isExecuting) {
    const parts = [`任务 ${taskId} 执行中`, `已完成 ${doneCount}/${stages.length} 阶段`];
    if (info.runningStage && info.runningStage !== '无') parts.push(info.runningStage);
    if (info.runningFile) parts.push(`当前 ${info.runningFile}${info.runningProgress ? ` (${info.runningProgress})` : ''}`);
    if (info.runtimeWarning) parts.push(info.runtimeWarning);
    else if (info.runningDuration) parts.push(`已运行 ${info.runningDuration}`);
    runHint.textContent = parts.join(' · ');
  } else if (latestProcessEvent?.event_type === 'GraphAbort') {
    runHint.textContent = `任务 ${taskId} 已中止`;
  } else if (latestProcessEvent?.event_type === 'StageRerunRequested') {
    runHint.textContent = `任务 ${taskId} 最近一次阶段重跑进行中`;
  } else if (latestProcessEvent?.event_type === 'StageRerunFailed') {
    runHint.textContent = `任务 ${taskId} 最近一次阶段重跑未通过`;
  } else if (latestProcessEvent?.event_type === 'StageRerunError') {
    runHint.textContent = `任务 ${taskId} 最近一次阶段重跑失败`;
  } else if (latestProcessEvent?.event_type === 'StageRerunAborted') {
    runHint.textContent = `任务 ${taskId} 最近一次阶段重跑已中止`;
  } else if (latestProcessEvent?.event_type === 'StageRerunDone') {
    runHint.textContent = `任务 ${taskId} 最近一次阶段重跑已完成`;
  } else if (latestProcessEvent?.event_type === 'GraphError') {
    runHint.textContent = `任务 ${taskId} 执行失败`;
  } else if (latestProcessEvent?.event_type === 'GraphRun') {
    runHint.textContent = `任务 ${taskId} 执行完成`;
  } else {
    runHint.textContent = leaderPlan?.summary ? `任务 ${taskId} 已生成流程：${leaderPlan.summary}` : `任务 ${taskId} 等待执行`;
  }
}

function renderTimeline() {
  const box = document.getElementById('timeline');
  if (!taskEvents.length) {
    if (lastTimelineSignature !== 'empty') {
      box.innerHTML = '<div class="hint">暂无事件</div>';
      lastTimelineSignature = 'empty';
    }
    return;
  }
  const recent = taskEvents.slice(-30).reverse();
  const sig = JSON.stringify([eventsHasMore, eventFetchLimit, ...recent.map((event) => [event.event_id, event.timestamp, selectedTimelineEventId])]);
  if (sig === lastTimelineSignature) return;
  const toolbar = renderEventHistoryToolbar('流程记录');
  const itemsHtml = recent.map((event) => {
    const label = EVENT_LABELS[event.event_type] || event.event_type;
    const stage = event.payload?.label || event.payload?.stage || event.payload?.event || '';
    const detail = event.payload?.current_file || event.payload?.message || event.payload?.feedback || event.payload?.error || event.payload?.reason || '';
    const active = selectedTimelineEventId === event.event_id ? ' active' : '';
    return `<button type="button" class="event-item${active}" data-event-id="${event.event_id}" data-stage="${escapeHtml(event.payload?.stage || '')}"><strong>${escapeHtml(label)}</strong><div class="event-meta">${escapeHtml(stage)}</div>${detail ? `<div class="event-meta">${escapeHtml(shortText(detail, 88))}</div>` : ''}<div class="event-meta">${asISO(event.timestamp)}</div></button>`;
  }).join('');
  box.innerHTML = toolbar + itemsHtml;
  box.querySelectorAll('[data-event-id]').forEach((element) => {
    element.addEventListener('click', () => {
      selectedTimelineEventId = element.dataset.eventId || '';
      const stage = element.dataset.stage || '';
      if (stage && isStageEvent(stage)) selectedEventKey = stage;
      renderTimeline();
      renderGraph();
      renderConfigEditor(true);
    });
  });
  lastTimelineSignature = sig;
}

function renderStageOutputs() {
  const box = document.getElementById('stageOutputs');
  const stages = currentStages();
  const payload = stages.map((stage) => {
    const snapshot = extractStageSnapshot(stage.name);
    return [stage.name, snapshot.latestEvent?.event_type || '', snapshot.latestEvent?.event_id || '', snapshot.latestReview?.event_id || '', snapshot.latestOutput?.event_id || ''];
  });
  const sig = JSON.stringify(payload);
  if (sig === lastStageOutputsSignature) return;
  box.innerHTML = stages.map((stage) => {
    const snapshot = extractStageSnapshot(stage.name);
    const event = snapshot.latestEvent;
    const outputEvent = snapshot.latestOutput || event;
    if (!outputEvent) {
      return `<div class="event-item"><strong>${escapeHtml(stage.label)}</strong><div class="event-meta">暂无输出</div></div>`;
    }
    const summary = outputEvent.payload?.output_summary || outputEvent.payload?.output || outputEvent.payload?.result || {};
    const role = outputEvent.payload?.planned_role || eventDetails?.[stage.name]?.role || '-';
    const review = snapshot.latestReview?.payload || outputEvent.payload?.review || {};
    const reviewText = review.review_status === 'skipped'
      ? '评审: 跳过'
      : (review.pass === true ? '评审: 通过' : (review.pass === false ? '评审: 未通过' : '评审: 待评估'));
    const feedback = review.feedback || '-';
    return `<div class="event-item"><strong>${escapeHtml(stage.label)} / ${escapeHtml(EVENT_LABELS[event?.event_type] || event?.event_type || outputEvent.event_type)}</strong><div class="event-meta">角色: ${escapeHtml(role)}</div><div class="event-meta">阶段类型: ${escapeHtml(stage.stage_type)}</div><div class="event-meta">${escapeHtml(reviewText)}</div><div class="event-meta">反馈: ${escapeHtml(feedback)}</div><pre style="margin-top:6px;max-height:130px;">${escapeHtml(JSON.stringify(summary, null, 2))}</pre></div>`;
  }).join('') || '<div class="hint">暂无阶段输出</div>';
  lastStageOutputsSignature = sig;
}

function renderArtifacts() {
  const box = document.getElementById('artifacts');
  const seen = new Set();
  const artifacts = [];
  const stages = currentStages();
  if (stages.length) {
    stages.forEach((stage) => {
      const snapshot = extractStageSnapshot(stage.name);
      const items = Array.isArray(snapshot.latestOutput?.payload?.artifacts) ? snapshot.latestOutput.payload.artifacts : [];
      items.forEach((artifact) => {
        const uri = String(artifact?.uri || '').trim();
        if (!uri || seen.has(uri)) return;
        seen.add(uri);
        artifacts.push({
          uri,
          label: artifact?.label || artifact?.name || uri,
          stage: stage.label || stage.name || '',
        });
      });
    });
  } else {
    taskEvents.forEach((event) => {
      const items = Array.isArray(event.payload?.artifacts) ? event.payload.artifacts : [];
      items.forEach((artifact) => {
        const uri = String(artifact?.uri || '').trim();
        if (!uri || seen.has(uri)) return;
        seen.add(uri);
        artifacts.push({
          uri,
          label: artifact?.label || artifact?.name || uri,
          stage: event.payload?.stage || '',
        });
      });
    });
  }
  if (!artifacts.length) {
    box.innerHTML = '<span class="pill">暂无 artifacts</span>';
    return;
  }
  box.innerHTML = artifacts.map((artifact) => `<span class="pill" title="${escapeHtml([artifact.stage, artifact.uri].filter(Boolean).join(' · '))}">${escapeHtml(artifact.label)}</span>`).join('');
}

function groupMessagesByStage(messages) {
  return (messages || []).reduce((acc, message) => {
    const key = message.stage_name || '__global__';
    if (!acc[key]) acc[key] = [];
    acc[key].push(message);
    return acc;
  }, {});
}

function getConfiguredConversationGroup(stage, stageDetail) {
  const sources = [stageDetail, stage, leaderPlan];
  for (const source of sources) {
    if (!source || typeof source !== 'object') continue;
    const raw = source.conversation_group || source.group_key || source.group || source.loop_group || source.collaboration_group;
    if (!raw) continue;
    if (typeof raw === 'string') {
      return { key: raw, label: raw };
    }
    if (typeof raw === 'object') {
      const key = raw.key || raw.id || raw.name;
      if (!key) continue;
      return {
        key: String(key),
        label: String(raw.label || raw.title || key),
      };
    }
  }
  return null;
}

function resolveConversationGroupDefinitions(stages) {
  const normalizedStages = stages || [];
  if (Array.isArray(conversationGroups) && conversationGroups.length) {
    return conversationGroups.map((group) => ({
      key: String(group.key || group.id || ''),
      label: String(group.label || group.title || group.key || group.id || '协作分组'),
      stageNames: Array.isArray(group.stage_names)
        ? group.stage_names.map((stageName) => String(stageName))
        : (Array.isArray(group.stages) ? group.stages.map((stageName) => String(stageName)) : []),
    })).filter((group) => group.key && group.stageNames.length);
  }
  const configured = [];
  const configuredMap = {};

  normalizedStages.forEach((stage) => {
    const detail = eventDetails?.[stage.name] || {};
    const cfg = getConfiguredConversationGroup(stage, detail);
    if (!cfg) return;
    if (!configuredMap[cfg.key]) {
      configuredMap[cfg.key] = { key: cfg.key, label: cfg.label, stageNames: [] };
      configured.push(configuredMap[cfg.key]);
    }
    configuredMap[cfg.key].stageNames.push(stage.name);
  });

  if (configured.length) return configured;

  const devGroups = window.MacsWorkflow.detectDevelopmentGroups
    ? window.MacsWorkflow.detectDevelopmentGroups(normalizedStages)
    : [];
  const devGroupByStage = {};
  devGroups.forEach((group) => {
    group.stageKeys.forEach((stageKey) => {
      devGroupByStage[stageKey] = {
        key: `flow:${group.id}`,
        label: group.title || '协作闭环',
        stageNames: group.stageKeys.slice(),
      };
    });
  });

  return normalizedStages.map((stage) => devGroupByStage[stage.name] || {
    key: stage.name,
    label: stage.label,
    stageNames: [stage.name],
  });
}

function buildConversationGroups(messages, blackboard, stages, stageState, groupBlackboards = []) {
  const stageMap = Object.fromEntries((stages || []).map((stage) => [stage.name, stage]));
  const groupDefs = resolveConversationGroupDefinitions(stages);
  const boardSnapshotMap = Object.fromEntries((groupBlackboards || []).filter((item) => item?.key).map((item) => [String(item.key), item]));
  const groupDefByStage = {};
  groupDefs.forEach((group) => {
    (group.stageNames || []).forEach((stageName) => {
      groupDefByStage[stageName] = group;
    });
  });
  const groups = [];
  const groupMap = {};
  const ensureGroup = (key, seed = {}) => {
    if (groupMap[key]) return groupMap[key];
    const group = {
      key,
      label: seed.label || '全局协作',
      stages: seed.stages || [],
      messages: [],
      blackboard: [],
      latest: null,
      status: seed.status || 'pending',
      boardSnapshot: seed.boardSnapshot || boardSnapshotMap[key] || null,
      rerun: seed.rerun || null,
    };
    groupMap[key] = group;
    groups.push(group);
    return group;
  };

  (stages || []).forEach((stage) => {
    const groupDef = groupDefByStage[stage.name] || { key: stage.name, label: stage.label, stageNames: [stage.name] };
    const groupStages = groupDef.stageNames.map((stageName) => stageMap[stageName]).filter(Boolean);
    const statuses = groupStages.map((item) => stageState[item.name]?.status || 'pending');
    const status = statuses.includes('running')
      ? 'running'
      : (statuses.includes('error')
        ? 'error'
        : (statuses.includes('rework')
          ? 'rework'
          : (statuses.includes('waiting')
            ? 'waiting'
            : (statuses.length && statuses.every((value) => value === 'done') ? 'done' : 'pending'))));
    ensureGroup(groupDef.key, {
      label: groupDef.label,
      stages: groupStages,
      status,
      boardSnapshot: boardSnapshotMap[groupDef.key] || null,
      rerun: findLatestStageRerun(groupDef.stageNames),
    });
  });

  (messages || []).forEach((message) => {
    const groupDef = message.group_key
      ? {
          key: String(message.group_key),
          label: String(message.group_label || message.group_key),
          stageNames: (groupDefs.find((item) => item.key === message.group_key)?.stageNames || (message.stage_name ? [message.stage_name] : [])),
        }
      : (groupDefByStage[message.stage_name] || { key: message.stage_name || '__global__', label: stageMap[message.stage_name]?.label || '全局协作', stageNames: message.stage_name ? [message.stage_name] : [] });
    const key = groupDef.key;
    const stage = stageMap[message.stage_name] || null;
    const group = ensureGroup(key, {
      label: groupDef.label || stage?.label || '全局协作',
      stages: (groupDef.stageNames || []).map((stageName) => stageMap[stageName]).filter(Boolean),
      status: stage ? (stageState[stage.name]?.status || 'pending') : 'pending',
      boardSnapshot: boardSnapshotMap[key] || null,
      rerun: findLatestStageRerun(groupDef.stageNames),
    });
    group.messages.push(message);
    const createdAt = Number(message.created_at || 0);
    if (!group.latest || createdAt >= Number(group.latest.created_at || 0)) group.latest = message;
  });

  (blackboard || []).forEach((entry) => {
    const groupDef = entry.group_key
      ? {
          key: String(entry.group_key),
          label: String(entry.group_label || entry.group_key),
          stageNames: (groupDefs.find((item) => item.key === entry.group_key)?.stageNames || (entry.stage_name ? [entry.stage_name] : [])),
        }
      : (groupDefByStage[entry.stage_name] || { key: entry.stage_name || '__global__', label: stageMap[entry.stage_name]?.label || '全局协作', stageNames: entry.stage_name ? [entry.stage_name] : [] });
    const key = groupDef.key;
    const stage = stageMap[entry.stage_name] || null;
    const group = ensureGroup(key, {
      label: groupDef.label || stage?.label || '全局协作',
      stages: (groupDef.stageNames || []).map((stageName) => stageMap[stageName]).filter(Boolean),
      status: stage ? (stageState[stage.name]?.status || 'pending') : 'pending',
      boardSnapshot: boardSnapshotMap[key] || null,
      rerun: findLatestStageRerun(groupDef.stageNames),
    });
    group.blackboard.push(entry);
  });

  return groups
    .filter((group) => group.messages.length || group.blackboard.length || group.stages.length)
    .sort((a, b) => {
      const aTs = Math.max(Number(a.latest?.created_at || 0), Number(a.rerun?.timestamp || 0));
      const bTs = Math.max(Number(b.latest?.created_at || 0), Number(b.rerun?.timestamp || 0));
      return bTs - aTs;
    });
}

      ? '人工/用户'
      : (message.message_type === 'system_status' ? '流程状态' : (actorKind === 'system' ? '系统' : actorLabel));
    const stageLabel = stages.find((stage) => stage.name === message.stage_name)?.label || message.stage_name || '全局';
    const palette = actorPalette(actorLabel);
    const avatar = `<span class="message-avatar" style="background:${palette.bg};border:1px solid ${palette.border};color:${palette.text};">${escapeHtml(actorInitials(actorTitle))}</span>`;
    const statusLevel = safeToken(message.payload?.status_level || '', '');
    const itemClass = isSystemStatus
      ? `system_status${statusLevel ? ` status-${statusLevel}` : ''}`
      : actorKind;
    const speakerClass = isSystemStatus ? 'system_status' : actorKind;
    const statusText = systemStatusKindLabel(message.payload?.status_kind || '', message);
    const statusBadge = isSystemStatus && statusLevel
      ? `<span class="system-status-inline ${statusLevel}">${escapeHtml(statusText)}</span>`
      : '';
    if (isSystemStatus) {
      return `
    <div class="message-row system-status-row">
      <div class="message-shell system-status-shell">
        <div class="message-item ${itemClass}">
          <div class="meta-line system-status-head">
            <span class="system-status-mark">流程播报</span>
            <span class="source-tag">${escapeHtml(stageLabel)}</span>
            ${statusBadge}
            <span class="message-note">${escapeHtml(asISO(message.created_at || 0))}</span>
          </div>
          <div class="content">${escapeHtml(message.content || JSON.stringify(message.payload || {}, null, 2))}</div>
        </div>
      </div>
    </div>
  `;
    }
    return `
    <div class="message-row ${actorKind}">
      ${actorKind === 'user' ? '' : avatar}
      <div class="message-shell">
        <div class="message-item ${itemClass}">
          <div class="meta-line"><span class="speaker-tag ${speakerClass}">${escapeHtml(actorTitle)}</span><span class="source-tag">${escapeHtml(stageLabel)}</span>${statusBadge}<span class="message-note">#${escapeHtml(String(message.turn_index || ''))}</span><span class="message-note">${escapeHtml(asISO(message.created_at || 0))}</span></div>
          <div class="content">${escapeHtml(message.content || JSON.stringify(message.payload || {}, null, 2))}</div>
        </div>
      </div>
      ${actorKind === 'user' ? avatar : ''}
    </div>
  `;
  }).join('');
  stream.innerHTML = streamHead
    + liveBanner
    + (activePreview ? `<div class="chat-summary-card"><strong>最新结论</strong><span>${escapeHtml(shortText(activePreview, 96))}</span></div>` : '')
    + `<div class="chat-divider"><span>对话实录</span></div>`
    + `<div class="chat-feed">${feedHtml || '<div class="chat-empty">该协作单元还没有对话消息</div>'}</div>`;
  const belongsToActiveGroup = pendingDecision && activeGroup.stages.some((stage) => stage?.name === pendingDecision.stage);
  if (pendingDecision && canSubmitHumanDecision() && belongsToActiveGroup) {
    const options = Array.isArray(pendingDecision.options) ? pendingDecision.options : [];
    if (selectedHumanDecisionOption && !options.includes(selectedHumanDecisionOption)) selectedHumanDecisionOption = '';
    decisionBox.classList.remove('locked');
    decisionBox.innerHTML = `
      <div class="decision-box-head">
        <div>
          <strong>等待人工决策</strong>
          <span>${escapeHtml(pendingDecision.question || '系统需要你提供一个明确决策，才能继续推进。')}</span>
        </div>
        <span class="decision-pill">${escapeHtml(pendingDecision.label || pendingDecision.stage || '当前阶段')}</span>
      </div>
      ${options.length ? `<div class="decision-options">${options.map((option) => `<button type="button" class="decision-option ${selectedHumanDecisionOption === option ? 'active' : ''}" data-decision-option="${escapeHtml(option)}">${escapeHtml(option)}</button>`).join('')}</div>` : ''}
      <textarea id="humanDecisionInput" class="decision-input" placeholder="请给出明确选择、理由和额外约束。系统会把这条意见写入当前阶段的协作上下文。"></textarea>
      <div class="decision-meta">${escapeHtml(pendingDecision.why_blocked || '当前分支无法自动收敛，因此系统暂停并等待你的判断。')}</div>
      <div class="decision-actions">
        <p class="hint">提交后不会自动续跑；你确认意见无误后，再点击“执行 Step”继续。</p>
        <button type="button" onclick="submitHumanDecision()">提交人工决策</button>
      </div>
    `;
    decisionBox.querySelectorAll('[data-decision-option]').forEach((element) => {
      element.addEventListener('click', () => {
        selectedHumanDecisionOption = element.dataset.decisionOption || '';
        renderCollaborationStatus();
      });
    });
  } else {
    selectedHumanDecisionOption = '';
    decisionBox.classList.add('locked');
    decisionBox.innerHTML = '<div class="hint">只有当系统明确发起人工决策时，这里才会开放输入；平时该区域仅用于展示协作过程，不接受人工干预。</div>';
  }
  if (renderKey !== lastConversationRenderKey) {
    maybeStickConversationToBottom();
    lastConversationRenderKey = renderKey;
  }

  board.querySelectorAll('[data-group-focus]').forEach((element) => {
    element.addEventListener('click', () => {
      selectedEventKey = element.dataset.primaryStage || selectedEventKey;
      lastConversationRenderKey = '';
      renderGraph();
      renderTimeline();
      renderConfigEditor(true);
      renderCollaborationStatus();
    });
  });
}

function renderLogsAndJson() {
  const sig = JSON.stringify(taskEvents.map((event) => [event.event_id, event.timestamp]));
  if (sig !== lastEventsSignature) {
    document.getElementById('events').textContent = JSON.stringify(taskEvents.map((event) => ({ ...event, ts: asISO(event.timestamp) })), null, 2);
    lastEventsSignature = sig;
  }
  const logs = taskEvents.slice(-40).map((event) => {
    const label = EVENT_LABELS[event.event_type] || event.event_type;
    const stage = event.payload?.label || event.payload?.stage || event.payload?.event || '';
    const detail = event.payload?.current_file || event.payload?.message || event.payload?.feedback || event.payload?.error || event.payload?.reason || '';
    return `${formatTimestamp(event.timestamp, false)} | ${label}${stage ? ` | ${stage}` : ''}${detail ? ` | ${String(detail).slice(0, 140)}` : ''}`;
  }).join('\n');
  document.getElementById('liveLog').textContent = logs || '暂无日志';
  if (currentInfoDrawer) openInfoDrawer(currentInfoDrawer);
}

async function loadMoreEventHistory() {
  if (!taskId || refreshAllInFlight || refreshCollaborationInFlight) return;
  const nextLimit = eventFetchLimit + EVENT_FETCH_STEP;
  eventFetchLimit = nextLimit;
  const nextEvents = await fetchEvents();

async function submitHumanDecision() {
  if (!canSubmitHumanDecision()) {
    alert('当前没有待处理的人工决策。');
    return;
  }
  const input = document.getElementById('humanDecisionInput');
  const decision = input?.value?.trim() || '';
  if (!decision && !selectedHumanDecisionOption) {
    alert('请至少输入决策意见，或先选择一个方案。');
    return;
  }
  const resp = await fetch(`/tasks/${encodeURIComponent(taskId)}/human-decisions`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      selected_option: selectedHumanDecisionOption || null,
      decision,
    }),
  });
  const data = await resp.json().catch(() => ({}));
  if (!resp.ok) {
    alert(data.detail || '提交人工决策失败');
    return;
  }
  selectedHumanDecisionOption = '';
  document.getElementById('runHint').textContent = data.message || '人工决策已记录，请继续执行 Step';
  await refreshAll();
}

async function fetchTask() {
  const tasks = await (await fetch(noCacheUrl('/tasks'), { cache: 'no-store' })).json();
  return tasks.find((task) => task.task_id === taskId) || null;
}

async function fetchEvents() {
  const requestedLimit = Math.max(EVENT_FETCH_STEP, Number(eventFetchLimit || EVENT_FETCH_STEP));
  const resp = await fetch(noCacheUrl(`/events?task_id=${encodeURIComponent(taskId)}&limit=${requestedLimit + 1}`), { cache: 'no-store' });
  const rows = await resp.json();
  const list = Array.isArray(rows) ? rows : [];
  eventsHasMore = list.length > requestedLimit;
  return eventsHasMore ? list.slice(list.length - requestedLimit) : list;
}

async function fetchEventConfigs() {
  const resp = await fetch(noCacheUrl(`/tasks/${encodeURIComponent(taskId)}/event-configs`), { cache: 'no-store' });
  if (!resp.ok) {
    rawEventConfigs = {};
    effectiveEventConfigs = {};
    defaultModelProvider = '';
    eventDetails = {};
    stageDefinitions = [];
    leaderPlan = {};
    conversationGroups = [];
    return {};
  }
  const data = await resp.json();
  defaultModelProvider = data.default_model_provider || '';
  rawEventConfigs = data.event_configs || {};
  effectiveEventConfigs = data.effective_event_configs || rawEventConfigs;
  eventDetails = data.event_details || {};
  stageDefinitions = data.stage_definitions || [];
  leaderPlan = data.leader_plan || {};
  conversationGroups = data.conversation_groups || leaderPlan.conversation_groups || [];
  ensureSelectedStage();
  return effectiveEventConfigs;
}

async function fetchCollaboration() {
  const resp = await fetch(noCacheUrl(`/tasks/${encodeURIComponent(taskId)}/collaboration?limit=120`), { cache: 'no-store' });
  if (!resp.ok) {
    collaborationData = { messages: [], blackboard: [], group_blackboards: [] };
    conversationGroups = conversationGroups || [];
    return collaborationData;
  }
  collaborationData = await resp.json();
  conversationGroups = collaborationData.conversation_groups || conversationGroups;
  return collaborationData;
}

async function fetchProviders() {
  const resp = await fetch(noCacheUrl('/models'), { cache: 'no-store' });
  const data = await resp.json();
  return data.providers || [];
}

async function saveEventConfig() {
  if (!isStageEvent(selectedEventKey)) return;
  const tempRaw = document.getElementById('cfgTemperature')?.value.trim() || '';
  const timeoutRaw = document.getElementById('cfgTimeout')?.value.trim() || '';
  const autoSmokeFixLimitRaw = document.getElementById('cfgAutoSmokeFixLimit')?.value.trim() || '';
  const autoFixLimitRaw = document.getElementById('cfgAutoFixLimit')?.value.trim() || '';
  const body = {
    model_provider: document.getElementById('cfgModelProvider')?.value || null,
    model: document.getElementById('cfgModel')?.value.trim() || null,
    temperature: tempRaw === '' ? null : Number(tempRaw),
    timeout: timeoutRaw === '' ? null : Number(timeoutRaw),
    notes: document.getElementById('cfgNotes')?.value.trim() || null,
    prompt_template: document.getElementById('cfgPromptTemplate')?.value.trim() || null,
    smoke_test_command: document.getElementById('cfgSmokeTestCommand')?.value.trim() || null,
    test_command: document.getElementById('cfgTestCommand')?.value.trim() || null,
    auto_smoke_fix_limit: autoSmokeFixLimitRaw === '' ? null : Number(autoSmokeFixLimitRaw),
    auto_fix_limit: autoFixLimitRaw === '' ? null : Number(autoFixLimitRaw),
    smoke_test_blocking: document.getElementById('cfgSmokeTestBlocking')?.checked ?? null,
    review_blocking: document.getElementById('cfgReviewBlocking')?.checked ?? null,
  };

  const resp = await fetch(`/tasks/${encodeURIComponent(taskId)}/event-configs/${encodeURIComponent(selectedEventKey)}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  const data = await resp.json();
  if (!resp.ok) {
    alert(data.detail || '保存失败');
    return;
  }
  const compact = Object.fromEntries(Object.entries(body).filter(([, value]) => value !== null && value !== ''));
  rawEventConfigs[selectedEventKey] = compact;
  effectiveEventConfigs[selectedEventKey] = {
    ...(effectiveEventConfigs[selectedEventKey] || {}),
    ...compact,
    model_provider: compact.model_provider || defaultModelProvider,
  };
  isConfigDirty = false;
  renderGraph();
  renderConfigEditor(true);
  await refreshAll();
}

async function clearEventConfig() {
  if (!isStageEvent(selectedEventKey)) return;
  await fetch(`/tasks/${encodeURIComponent(taskId)}/event-configs/${encodeURIComponent(selectedEventKey)}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model_provider: null,
      model: null,
      temperature: null,
      timeout: null,
      notes: null,
      prompt_template: null,
      smoke_test_command: null,
      test_command: null,
      auto_smoke_fix_limit: null,
      auto_fix_limit: null,
      smoke_test_blocking: null,
      review_blocking: null,
    }),
  });
  rawEventConfigs[selectedEventKey] = {};
  effectiveEventConfigs[selectedEventKey] = {
    ...(effectiveEventConfigs[selectedEventKey] || {}),
    model_provider: defaultModelProvider,
  };
  isConfigDirty = false;
  renderGraph();
  renderConfigEditor(true);
